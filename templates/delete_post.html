{% extends 'base.html' %}

{% block title %}Delete Post - My Blog{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger">
                <div class="card-body">
                    <h5 class="card-title text-danger">Delete Post</h5>
                    <p class="card-text">Are you sure you want to delete this post?</p>
                    <p class="text-muted"><strong>{{ post.title }}</strong></p>
                    
                    <div class="alert alert-warning" role="alert">
                        <small>This action cannot be undone.</small>
                    </div>
                    
                    <form method="POST" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Delete Permanently</button>
                        <a href="{% url 'post_detail' post.pk %}" class="btn btn-outline-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
